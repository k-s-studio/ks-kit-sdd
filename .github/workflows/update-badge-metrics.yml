name: Update Badge Metrics

on:
  push:
    branches:
      - main
    paths:
      - ".github/agents/**"
      - ".github/skills/**"
      - ".github/prompts/**"
      - ".github/workflows/update-badge-metrics.ps1"
      - ".github/workflows/update-badge-metrics.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Refresh badge metrics
        shell: pwsh
        run: ./.github/workflows/update-badge-metrics.ps1

      - name: Commit updated metrics
        shell: bash
        run: |
          git add -f metrics.json

          if git diff --cached --quiet -- metrics.json; then
            echo "Badge metrics are already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: update badge metrics"
          git push